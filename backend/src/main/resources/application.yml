server:
  port: 8080

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-this-demo-secret-for-production-change-this-demo-secret}
    issuer: "lovius-bento"
    expiration-minutes: 240
    refresh-expiration-days: 14
  mail:
    mode: ${APP_MAIL_MODE:mock}
    from: ${APP_MAIL_FROM:no-reply@lovius.local}
    smtp:
      host: ${APP_MAIL_SMTP_HOST:smtp.gmail.com}
      port: ${APP_MAIL_SMTP_PORT:587}
      username: ${APP_MAIL_SMTP_USERNAME:}
      password: ${APP_MAIL_SMTP_PASSWORD:}
      auth: ${APP_MAIL_SMTP_AUTH:true}
      starttls: ${APP_MAIL_SMTP_STARTTLS:true}
  pdf:
    font-path: ${APP_PDF_FONT_PATH:}

spring:
  profiles:
    default: dev
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/bento?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei}
    username: ${SPRING_DATASOURCE_USERNAME:bento}
    password: ${SPRING_DATASOURCE_PASSWORD:bento}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
