server:
  port: 8080

app:
  jwt:
    secret: "change-this-demo-secret-for-production-change-this-demo-secret"
    issuer: "lovius-bento"
    expiration-minutes: 240
    refresh-expiration-days: 14

spring:
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/bento?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei}
    username: ${SPRING_DATASOURCE_USERNAME:bento}
    password: ${SPRING_DATASOURCE_PASSWORD:bento}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
