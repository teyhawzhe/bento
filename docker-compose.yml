services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bento?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei
      SPRING_DATASOURCE_USERNAME: bento
      SPRING_DATASOURCE_PASSWORD: bento
      APP_MAIL_MODE: ${APP_MAIL_MODE:-mock}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-dev-mail@lovius.local}
      APP_MAIL_SMTP_HOST: ${APP_MAIL_SMTP_HOST:-smtp.gmail.com}
      APP_MAIL_SMTP_PORT: ${APP_MAIL_SMTP_PORT:-587}
      APP_MAIL_SMTP_USERNAME: ${APP_MAIL_SMTP_USERNAME:-}
      APP_MAIL_SMTP_PASSWORD: ${APP_MAIL_SMTP_PASSWORD:-}
      APP_PDF_FONT_PATH: ${APP_PDF_FONT_PATH:-/usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: bento
      MYSQL_USER: bento
      MYSQL_PASSWORD: bento
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
