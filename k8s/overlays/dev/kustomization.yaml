apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: bento-dev

resources:
  - ../../base
  - backend-config.yaml
  - frontend-config.yaml
  - mysql-deployment.yaml
  - mysql-service.yaml
  - mysql-pvc.yaml

images:
  - name: lovius/bento-backend
    newTag: dev
  - name: lovius/bento-frontend
    newTag: dev

patches:
  - path: ingress-patch.yaml
