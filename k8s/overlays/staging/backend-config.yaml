apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
data:
  SPRING_PROFILES_ACTIVE: staging
  SPRING_DATASOURCE_URL: jdbc:mysql://staging-mysql.internal:3306/bento?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei
  SPRING_DATASOURCE_USERNAME: bento
  APP_MAIL_MODE: smtp
  APP_MAIL_FROM: staging-mail@lovius.local
  APP_MAIL_SMTP_HOST: smtp.gmail.com
  APP_MAIL_SMTP_PORT: "587"
  APP_MAIL_SMTP_AUTH: "true"
  APP_MAIL_SMTP_STARTTLS: "true"
  APP_PDF_FONT_PATH: /usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc
