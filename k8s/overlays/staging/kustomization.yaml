apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: bento-staging

resources:
  - ../../base
  - backend-config.yaml
  - frontend-config.yaml

images:
  - name: lovius/bento-backend
    newTag: staging
  - name: lovius/bento-frontend
    newTag: staging

patches:
  - path: ingress-patch.yaml
