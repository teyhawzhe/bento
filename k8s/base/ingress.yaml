apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bento
  labels:
    app.kubernetes.io/part-of: bento
spec:
  ingressClassName: nginx
  rules:
    - host: example.invalid
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
